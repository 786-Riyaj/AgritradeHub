<html th:replace="~{base::layout(~{::main})}">
<body>
	<main>
		<div class="row"
			style="background-image: url('https://static.vecteezy.com/system/resources/thumbnails/033/825/367/small/vegetables-on-black-wood-background-ai-generative-photo.jpg'); background-repeat: no-repeat; background-size: cover;">
			<!-- Background -->
			<div
				class="d-flex bg-dark bg-opacity-75 align-items-center justify-content-center vh-100">

				<!-- Login Card -->
				<div class="card shadow-lg border-0 rounded-4 p-3"
					style="max-width: 420px; width: 100%;">
					<div
						class="card-header bg-success text-white text-center rounded-top-4">
						<h3 class="fw-bold mb-0">🌾 Agritrade Hub</h3>
						<small>Login to continue</small>
					</div>
					<div class="card-body p-4">
						<form method="post">

							<!-- Email -->
							<div class="mb-3">
								<label class="fw-semibold">Email</label> <input name="email"
									type="email" class="form-control" required
									placeholder="Enter your email">
							</div>

							<!-- Password -->
							<div class="mb-3">
								<label class="fw-semibold">Password</label> <input
									name="password" type="password" class="form-control" required
									placeholder="Enter your password">
							</div>

							<!-- Remember Me + Forgot -->
							<div
								class="d-flex justify-content-between align-items-center mb-3">
								<div class="form-check">
									<input class="form-check-input" type="checkbox" id="rememberMe">
									<label class="form-check-label" for="rememberMe">Remember
										me</label>
								</div>
								<a href="#"
									class="text-decoration-none text-success fw-semibold">Forgot
									Password?</a>
							</div>

							<!-- Submit Button -->
							<div class="d-grid">
								<button type="submit"
									class="btn btn-success fw-bold shadow-sm hover-scale">
									Login</button>
							</div>
						</form>
					</div>

					<!-- Footer -->
					<div class="card-footer text-center bg-light border-0 ">
						<small class="text-muted"> Don’t have an account ?

							<div class="btn-group dropend">
								<button type="button"
									class="btn btn-link dropdown-toggle text-success fw-semibold text-decoration-none"
									data-bs-toggle="dropdown" aria-expanded="false">
									Register Now</button>

								<ul class="dropdown-menu shadow rounded-3">
									<li><a class="dropdown-item fw-semibold"
										href="/FarmerRegistration"> Farmer Registration </a></li>
									<li><a class="dropdown-item fw-semibold"
										href="/MerchantRegistration"> Merchant Registration </a></li>
								</ul>
							</div>

						</small>
					</div>
				</div>
			</div>

		</div>




		<!-- Extra CSS -->
		<style>
.hover-scale {
	transition: all 0.3s ease;
}

.hover-scale:hover {
	transform: scale(1.05);
	box-shadow: 0px 8px 20px rgba(0, 128, 0, 0.3);
}

/* Register Now button */
.btn-group .dropdown-toggle {
	color: #198754; /* bootstrap success */
	transition: color 0.2s ease;
}

.btn-group .dropdown-toggle:hover {
	color: #14532d;
}

/* Dropdown items */
.btn-group .dropdown-item {
	color: #14532d;
	transition: color 0.2s ease;
}

.btn-group .dropdown-item:hover {
	color: #198754;
	background-color: transparent;
}
</style>

	</main>
</body>
</html>
